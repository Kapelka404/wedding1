<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Свадьба Кирилла и Александры</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f5f5f5;
            color: #1a1a4e; 
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .admin-container {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(26, 26, 78, 0.1);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 25px;
            border-radius: 50px;
            border: 2px solid #1a1a4e;
            background: transparent;
            color: #1a1a4e;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: #1a1a4e;
            color: #fff;
        }

        .tab-btn:hover {
            background: #c9a84c;
            border-color: #c9a84c;
            color: #1a1a4e;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a4e;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: #1a1a4e;
            color: #fff;
        }

        th {
            padding: 12px 15px;
            text-align: left;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .status-yes {
            color: #27ae60;
            font-weight: 500;
        }

        .status-no {
            color: #e74c3c;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 30px;
        }

        .btn-export {
            display: inline-block;
            background: #1a1a4e;
            color: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-export:hover {
            background: #c9a84c;
            color: #1a1a4e;
        }

        .group-label {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            margin-right: 5px;
        }

        .group-family {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .group-relatives {
            background: #e3f2fd;
            color: #0d47a1;
        }

        .group-friend {
            background: #fff3e0;
            color: #e65100;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .btn-refresh {
            display: inline-block;
            background: #ecf0f1;
            color: #2c3e50;
            padding: 10px 25px;
            border-radius: 50px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-refresh:hover {
            background: #d5dbdb;
        }

        @media (max-width: 600px) {
            .admin-container {
                padding: 20px 15px;
            }
            .tabs {
                gap: 5px;
            }
            .tab-btn {
                padding: 8px 15px;
                font-size: 12px;
            }
            .stats {
                gap: 20px;
            }
            .stat-number {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>Админ-панель</h1>
        <p class="subtitle">Список гостей, подтвердивших присутствие</p>

        <div class="tabs">
            <button class="tab-btn active" data-group="all" onclick="switchTab('all')">Все (0)</button>
            <button class="tab-btn" data-group="family" onclick="switchTab('family')">👨‍👩‍👧‍👦 Близкие (0)</button>
            <button class="tab-btn" data-group="relatives" onclick="switchTab('relatives')">👨‍👩‍👦 Дальние (0)</button>
            <button class="tab-btn" data-group="friend" onclick="switchTab('friend')">🍖 Друзья (0)</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Всего ответов</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="yesCount">0</div>
                <div class="stat-label">Придут</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="noCount">0</div>
                <div class="stat-label">Не придут</div>
            </div>
        </div>

        <div id="responsesContainer">
            <div class="loading">⏳ Загрузка данных...</div>
        </div>

        <div class="actions">
            <button class="btn-refresh" onclick="loadData()">🔄 Обновить</button>
            <button class="btn-export" onclick="exportToCSV()">📥 Скачать список (CSV)</button>
        </div>
    </div>

    <script>
        let currentGroup = 'all';
        let allGuests = [];

        // ===== ЗАГРУЗКА ДАННЫХ ИЗ ISSUES =====
        async function loadData() {
            const container = document.getElementById('responsesContainer');
            container.innerHTML = `<div class="loading">⏳ Загрузка данных...</div>`;

            try {
                // Получаем все Issues с меткой rsvp
                const response = await fetch('https://api.github.com/repos/kapelka404/wedding1/issues?state=all&labels=rsvp', {
                    headers: {
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Ошибка загрузки');
                }

                const issues = await response.json();
                allGuests = [];

                issues.forEach(issue => {
                    // Парсим тело Issue
                    const body = issue.body || '';
                    const name = body.match(/Имя: (.+)/)?.[1] || 'Без имени';
                    const presence = body.match(/Присутствие: (.+)/)?.[1] || 'Не указано';
                    const companion = body.match(/Компания: (.+)/)?.[1] || '—';
                    const group = body.match(/Группа: (.+)/)?.[1] || 'family';
                    const created_at = issue.created_at;

                    allGuests.push({
                        name: name.trim(),
                        presence: presence.trim(),
                        companion: companion.trim(),
                        group: group.trim(),
                        created_at: created_at
                    });
                });

                renderData();

            } catch (error) {
                console.error('Ошибка загрузки:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>Ошибка загрузки данных. Проверьте подключение.</p>
                        <button class="btn-refresh" style="margin-top:15px;" onclick="loadData()">🔄 Попробовать снова</button>
                    </div>
                `;
            }
        }

        function getGroupLabel(group) {
            const labels = { 'family': 'Близкие', 'relatives': 'Дальние', 'friend': 'Друзья' };
            return labels[group] || group || 'Неизвестно';
        }

        function getGroupClass(group) {
            const classes = { 'family': 'group-family', 'relatives': 'group-relatives', 'friend': 'group-friend' };
            return classes[group] || '';
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function switchTab(group) {
            currentGroup = group;
            renderData();
        }

        function renderData() {
            const filtered = currentGroup === 'all' ? allGuests : allGuests.filter(g => g.group === currentGroup);

            const groups = {
                all: allGuests.length,
                family: allGuests.filter(g => g.group === 'family').length,
                relatives: allGuests.filter(g => g.group === 'relatives').length,
                friend: allGuests.filter(g => g.group === 'friend').length
            };

            document.querySelectorAll('.tab-btn').forEach(btn => {
                const group = btn.dataset.group;
                const count = groups[group] || 0;
                btn.innerHTML = btn.innerHTML.replace(/\(\d+\)/, `(${count})`);
                btn.classList.toggle('active', group === currentGroup);
            });

            const total = allGuests.length;
            const yes = allGuests.filter(g => g.presence && g.presence !== 'К сожалению, не смогу').length;
            const no = allGuests.filter(g => g.presence === 'К сожалению, не смогу').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('yesCount').textContent = yes;
            document.getElementById('noCount').textContent = no;

            const container = document.getElementById('responsesContainer');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>Пока нет ни одного ответа${currentGroup !== 'all' ? ' в этой группе' : ''}</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Имя</th>
                                <th>Ответ</th>
                                <th>Компания</th>
                                <th>Группа</th>
                                <th>Дата</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            filtered.forEach((g, index) => {
                const isYes = g.presence && g.presence !== 'К сожалению, не смогу';
                const statusClass = isYes ? 'status-yes' : 'status-no';
                const date = g.created_at ? new Date(g.created_at).toLocaleString('ru-RU') : 'только что';
                const groupLabel = getGroupLabel(g.group);
                const groupClass = getGroupClass(g.group);

                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${escapeHtml(g.name || 'Без имени')}</strong></td>
                        <td class="${statusClass}">${escapeHtml(g.presence || 'Не указано')}</td>
                        <td>${escapeHtml(g.companion || '—')}</td>
                        <td><span class="group-label ${groupClass}">${groupLabel}</span></td>
                        <td style="font-size: 12px; opacity: 0.7;">${date}</td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        function exportToCSV() {
            if (allGuests.length === 0) {
                alert('Нет данных для экспорта.');
                return;
            }

            const BOM = '\uFEFF';
            let csv = BOM + 'Имя;Ответ;Компания;Группа;Дата\n';

            allGuests.forEach(g => {
                const date = g.created_at ? new Date(g.created_at).toLocaleString('ru-RU') : '';
                const row = [
                    `"${(g.name || '').replace(/"/g, '""')}"`,
                    `"${(g.presence || '').replace(/"/g, '""')}"`,
                    `"${(g.companion || '').replace(/"/g, '""')}"`,
                    `"${getGroupLabel(g.group).replace(/"/g, '""')}"`,
                    `"${date.replace(/"/g, '""')}"`
                ];
                csv += row.join(';') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            const now = new Date().toISOString().slice(0, 10);
            link.download = `список_гостей_${now}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        }

        // Загружаем данные при старте
        loadData();
    </script>
</body>
</html>
