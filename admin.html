<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>–ê–¥–Φ–Η–Ϋ-–Ω–Α–Ϋ–Β–Μ―¨ βÄî –Γ–≤–Α–¥―¨–±–Α –ö–Η―Ä–Η–Μ–Μ–Α –Η –ê–Μ–Β–Κ―¹–Α–Ϋ–¥―Ä―΄</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f5f5f5;
            color: #1a1a4e; 
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .admin-container {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(26, 26, 78, 0.1);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 25px;
            border-radius: 50px;
            border: 2px solid #1a1a4e;
            background: transparent;
            color: #1a1a4e;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: #1a1a4e;
            color: #fff;
        }

        .tab-btn:hover {
            background: #c9a84c;
            border-color: #c9a84c;
            color: #1a1a4e;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a4e;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: #1a1a4e;
            color: #fff;
        }

        th {
            padding: 12px 15px;
            text-align: left;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .status-yes {
            color: #27ae60;
            font-weight: 500;
        }

        .status-no {
            color: #e74c3c;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 30px;
        }

        .btn-export {
            display: inline-block;
            background: #1a1a4e;
            color: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-export:hover {
            background: #c9a84c;
            color: #1a1a4e;
        }

        .group-label {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            margin-right: 5px;
        }

        .group-family {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .group-relatives {
            background: #e3f2fd;
            color: #0d47a1;
        }

        .group-friend {
            background: #fff3e0;
            color: #e65100;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        @media (max-width: 600px) {
            .admin-container {
                padding: 20px 15px;
            }
            .tabs {
                gap: 5px;
            }
            .tab-btn {
                padding: 8px 15px;
                font-size: 12px;
            }
            .stats {
                gap: 20px;
            }
            .stat-number {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>–ê–¥–Φ–Η–Ϋ-–Ω–Α–Ϋ–Β–Μ―¨</h1>
        <p class="subtitle">–Γ–Ω–Η―¹–Ψ–Κ –≥–Ψ―¹―²–Β–Ι, –Ω–Ψ–¥―²–≤–Β―Ä–¥–Η–≤―à–Η―Ö –Ω―Ä–Η―¹―É―²―¹―²–≤–Η–Β</p>

        <div class="tabs">
            <button class="tab-btn active" data-group="all" onclick="switchTab('all')">–£―¹–Β (0)</button>
            <button class="tab-btn" data-group="family" onclick="switchTab('family')">πüë®βÄçπüë©βÄçπüëßβÄçπüëΠ –ë–Μ–Η–Ζ–Κ–Η–Β (0)</button>
            <button class="tab-btn" data-group="relatives" onclick="switchTab('relatives')">πüë®βÄçπüë©βÄçπüëΠ –î–Α–Μ―¨–Ϋ–Η–Β (0)</button>
            <button class="tab-btn" data-group="friend" onclick="switchTab('friend')">πüç• –î―Ä―É–Ζ―¨―è (0)</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">–£―¹–Β–≥–Ψ –Ψ―²–≤–Β―²–Ψ–≤</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="yesCount">0</div>
                <div class="stat-label">–ü―Ä–Η–¥―É―²</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="noCount">0</div>
                <div class="stat-label">–ù–Β –Ω―Ä–Η–¥―É―²</div>
            </div>
        </div>

        <div id="responsesContainer">
            <div class="loading">βè≥ –½–Α–≥―Ä―É–Ζ–Κ–Α –¥–Α–Ϋ–Ϋ―΄―Ö...</div>
        </div>

        <div class="actions">
            <button class="btn-export" onclick="exportToCSV()">πü™Ξ –Γ–Κ–Α―΅–Α―²―¨ ―¹–Ω–Η―¹–Ψ–Κ (CSV)</button>
        </div>
    </div>

    <script>
        let currentGroup = 'all';
        let allGuests = [];

        function getGroupLabel(group) {
            const labels = { 'family': '–ë–Μ–Η–Ζ–Κ–Η–Β', 'relatives': '–î–Α–Μ―¨–Ϋ–Η–Β', 'friend': '–î―Ä―É–Ζ―¨―è' };
            return labels[group] || group || '–ù–Β–Η–Ζ–≤–Β―¹―²–Ϋ–Ψ';
        }

        function getGroupClass(group) {
            const classes = { 'family': 'group-family', 'relatives': 'group-relatives', 'friend': 'group-friend' };
            return classes[group] || '';
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function switchTab(group) {
            currentGroup = group;
            renderData();
        }

        async function loadData() {
            const container = document.getElementById('responsesContainer');
            container.innerHTML = `<div class="loading">βè≥ –½–Α–≥―Ä―É–Ζ–Κ–Α –¥–Α–Ϋ–Ϋ―΄―Ö...</div>`;

            try {
                // –ß–Η―²–Α–Β–Φ data.json –Η–Ζ ―Ä–Β–Ω–Ψ–Ζ–Η―²–Ψ―Ä–Η―è (–Ω―É–±–Μ–Η―΅–Ϋ―΄–Ι –¥–Ψ―¹―²―É–Ω)
                const response = await fetch('https://raw.githubusercontent.com/Kapelka404/wedding/main/data.json');
                
                if (!response.ok) {
                    // –ï―¹–Μ–Η ―³–Α–Ι–Μ–Α –Ϋ–Β―², ―¹–Ψ–Ζ–¥–Α–Β–Φ –Ω―É―¹―²–Ψ–Ι
                    allGuests = [];
                    renderData();
                    return;
                }

                const data = await response.json();
                allGuests = data.guests || [];
                renderData();

            } catch (error) {
                console.error('–û―à–Η–±–Κ–Α –Ζ–Α–≥―Ä―É–Ζ–Κ–Η:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">βö†οΗè</div>
                        <p>–û―à–Η–±–Κ–Α –Ζ–Α–≥―Ä―É–Ζ–Κ–Η –¥–Α–Ϋ–Ϋ―΄―Ö. –ü―Ä–Ψ–≤–Β―Ä―¨―²–Β –Ω–Ψ–¥–Κ–Μ―é―΅–Β–Ϋ–Η–Β.</p>
                    </div>
                `;
            }
        }

        function renderData() {
            const filtered = currentGroup === 'all' ? allGuests : allGuests.filter(g => g.group === currentGroup);

            // –û–±–Ϋ–Ψ–≤–Μ―è–Β–Φ ―¹―΅–Β―²―΅–Η–Κ–Η –Ϋ–Α –≤–Κ–Μ–Α–¥–Κ–Α―Ö
            const groups = {
                all: allGuests.length,
                family: allGuests.filter(g => g.group === 'family').length,
                relatives: allGuests.filter(g => g.group === 'relatives').length,
                friend: allGuests.filter(g => g.group === 'friend').length
            };

            document.querySelectorAll('.tab-btn').forEach(btn => {
                const group = btn.dataset.group;
                const count = groups[group] || 0;
                btn.innerHTML = btn.innerHTML.replace(/\(\d+\)/, `(${count})`);
                btn.classList.toggle('active', group === currentGroup);
            });

            // –Γ―²–Α―²–Η―¹―²–Η–Κ–Α
            const total = allGuests.length;
            const yes = allGuests.filter(g => g.presence && g.presence !== '–ö ―¹–Ψ–Ε–Α–Μ–Β–Ϋ–Η―é, –Ϋ–Β ―¹–Φ–Ψ–≥―É').length;
            const no = allGuests.filter(g => g.presence === '–ö ―¹–Ψ–Ε–Α–Μ–Β–Ϋ–Η―é, –Ϋ–Β ―¹–Φ–Ψ–≥―É').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('yesCount').textContent = yes;
            document.getElementById('noCount').textContent = no;

            const container = document.getElementById('responsesContainer');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">πü™≠</div>
                        <p>–ü–Ψ–Κ–Α –Ϋ–Β―² –Ϋ–Η –Ψ–¥–Ϋ–Ψ–≥–Ψ –Ψ―²–≤–Β―²–Α${currentGroup !== 'all' ? ' –≤ ―ç―²–Ψ–Ι –≥―Ä―É–Ω–Ω–Β' : ''}</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>–‰–Φ―è</th>
                                <th>–û―²–≤–Β―²</th>
                                <th>–ö–Ψ–Φ–Ω–Α–Ϋ–Η―è</th>
                                <th>–™―Ä―É–Ω–Ω–Α</th>
                                <th>–î–Α―²–Α</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            filtered.forEach((g, index) => {
                const isYes = g.presence && g.presence !== '–ö ―¹–Ψ–Ε–Α–Μ–Β–Ϋ–Η―é, –Ϋ–Β ―¹–Φ–Ψ–≥―É';
                const statusClass = isYes ? 'status-yes' : 'status-no';
                const date = g.created_at ? new Date(g.created_at).toLocaleString('ru-RU') : '―²–Ψ–Μ―¨–Κ–Ψ ―΅―²–Ψ';
                const groupLabel = getGroupLabel(g.group);
                const groupClass = getGroupClass(g.group);

                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${escapeHtml(g.name || '–ë–Β–Ζ –Η–Φ–Β–Ϋ–Η')}</strong></td>
                        <td class="${statusClass}">${escapeHtml(g.presence || '–ù–Β ―É–Κ–Α–Ζ–Α–Ϋ–Ψ')}</td>
                        <td>${escapeHtml(g.companion || 'βÄî')}</td>
                        <td><span class="group-label ${groupClass}">${groupLabel}</span></td>
                        <td style="font-size: 12px; opacity: 0.7;">${date}</td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        function exportToCSV() {
            if (allGuests.length === 0) {
                alert('–ù–Β―² –¥–Α–Ϋ–Ϋ―΄―Ö –¥–Μ―è ―ç–Κ―¹–Ω–Ψ―Ä―²–Α.');
                return;
            }

            const BOM = '\uFEFF';
            let csv = BOM + '–‰–Φ―è;–û―²–≤–Β―²;–ö–Ψ–Φ–Ω–Α–Ϋ–Η―è;–™―Ä―É–Ω–Ω–Α;–î–Α―²–Α\n';

            allGuests.forEach(g => {
                const date = g.created_at ? new Date(g.created_at).toLocaleString('ru-RU') : '';
                const row = [
                    `"${(g.name || '').replace(/"/g, '""')}"`,
                    `"${(g.presence || '').replace(/"/g, '""')}"`,
                    `"${(g.companion || '').replace(/"/g, '""')}"`,
                    `"${getGroupLabel(g.group).replace(/"/g, '""')}"`,
                    `"${date.replace(/"/g, '""')}"`
                ];
                csv += row.join(';') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            const now = new Date().toISOString().slice(0, 10);
            link.download = `―¹–Ω–Η―¹–Ψ–Κ_–≥–Ψ―¹―²–Β–Ι_${now}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        }

        // –½–Α–≥―Ä―É–Ε–Α–Β–Φ –¥–Α–Ϋ–Ϋ―΄–Β –Ω―Ä–Η ―¹―²–Α―Ä―²–Β
        loadData();
    </script>
</body>
</html>
